name: CI

on:
  push:
    branches: [main, semantic]
  pull_request:
    branches: [main, semantic]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.9.9"

      - name: set up python
        run: uv python install ${{ matrix.python }}

      - name: install gr0m_mem with dev extras
        run: uv pip install --system -e ".[dev]"

      - name: ruff
        run: uv run --no-sync ruff check gr0m_mem tests

      - name: mypy
        run: uv run --no-sync mypy gr0m_mem

      - name: pytest
        run: uv run --no-sync pytest -q

      - name: loop_prevention benchmark (must stay 100%)
        run: |
          uv run --no-sync python -m benchmarks.loop_prevention.run \
            --out benchmarks/results/ci-${{ matrix.os }}-py${{ matrix.python }}.json \
            --strict
